org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Performance optimizations (reduced for memory)
org.gradle.parallel=false
org.gradle.caching=true
org.gradle.workers.max=2
org.gradle.vfs.watch=false

# Disable unnecessary features
android.enableD8.desugaring=true

# Kotlin daemon stability (avoid daemon connection failures on some setups)
kotlin.compiler.execution.strategy=in-process
kotlin.daemon.enabled=false
