name: matjark
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.5

  # Firebase core services - newest compatible versions
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  cloud_functions: ^6.0.7
  firebase_messaging: ^16.1.2

  # Authentication helpers
  google_sign_in: ^6.3.0

  # File handling
  file_picker: ^8.0.7
  image_picker: ^1.0.4

  # State management
  provider: ^6.0.5
  flutter_secure_storage: ^9.0.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ">=0.18.1 <0.21.0"
  easy_localization: ^3.0.3

  # UI & other helpers
  cached_network_image: ^3.2.3
  flutter_slidable: ^3.0.0
  flutter_staggered_grid_view: ^0.6.2
  url_launcher: ^6.1.11
  http: ^1.2.2
  shared_preferences: ^2.1.1
  flutter_svg: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/translations/
